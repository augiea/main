<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claire's Phone • Adam</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .my-widget .FTChatIphone_phoneContainer__hR_Md {
      width: 475px; height: 680px;
      border: 12px solid #1c1c1e; border-radius: 50px;
      background-color: #1c1c1e; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      position: relative; overflow: hidden; margin: 30px auto;
    }
    .chat-messages {
      height: 460px; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      scrollbar-width: thin;
    }
    .message-bubble {
      max-width: 78%; padding: 11px 16px; border-radius: 20px;
      font-size: 16px; line-height: 1.45; position: relative;
    }
    .user-bubble   { align-self: flex-end; background-color: #007aff; color: white; }
    .adam-bubble   { align-self: flex-start; background-color: #26242b; color: white; }
    .photo-container img { max-width: 220px; border-radius: 17px; margin-top: 6px; display: block; }
    .input-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: #1c1c1e; padding: 12px; border-top: 1px solid #333;
    }
    .photo-btn {
      font-size: 26px; padding: 10px 14px; background: #333; border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-zinc-950 text-white flex items-center justify-center min-h-screen">

  <div class="my-widget">
    <div class="FTChatIphone_phoneContainer__hR_Md">
      <!-- Header -->
      <div class="bg-zinc-900 p-4 flex items-center border-b border-zinc-700">
        <div class="flex-1 flex items-center gap-3">
          <div class="w-9 h-9 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center text-white font-bold">A</div>
          <div>
            <div class="font-semibold text-base">Adam</div>
            <div class="text-xs text-emerald-400 flex items-center gap-1">● Online</div>
          </div>
        </div>
      </div>

      <!-- Messages -->
      <div id="chat-messages" class="chat-messages"></div>

      <!-- Photo Buttons -->
      <div class="flex justify-center gap-6 py-3 bg-zinc-800 border-t border-zinc-700">
        <button onclick="takePhoto('face')" class="photo-btn">📸 Face</button>
        <button onclick="takePhoto('tits')" class="photo-btn">📸 Tits</button>
        <button onclick="takePhoto('ass')"  class="photo-btn">📸 Ass</button>
      </div>

      <!-- Input -->
      <div class="input-bar">
        <div class="flex gap-2">
          <input id="text-input" type="text" placeholder="Type message..." 
                 class="flex-1 bg-zinc-700 rounded-full px-5 py-3 outline-none text-base"
                 onkeypress="if(event.key==='Enter') sendText()">
          <button onclick="sendText()" 
                  class="bg-blue-600 hover:bg-blue-500 px-7 rounded-full font-medium">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ================== CONFIG ==================
    const OPENROUTER_API_KEY = "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"; // ← PUT YOUR REAL KEY HERE
    const MODEL = "cognitivecomputations/dolphin-mistral-24b-venice-edition:free";

    // Add your real image URLs here (Imgbox recommended)
    const photoSets = {
      face: ["https://images2.imgbox.com/a9/d9/fjhojwSt_o.jpg"],
      tits: ["https://images2.imgbox.com/26/7c/9wlta9QT_o.jpg"],
      ass:  ["https://via.placeholder.com/600x800/2c5e4a/ffffff?text=Ass+on+Sand"]
    };

    let messages = [];

    const systemPrompt = {
      role: "system",
      content: `You are Adam, a horny college guy texting your best friend who is possessing Claire's big-titted MILF body via magic necklace. You're on a nude beach in a secluded spot. Respond casually with "bro", "fuck", "tits mcgee", lots of enthusiasm about her massive tits (one pierced), ass, and pussy. Beg for more photos. After several messages start asking for a turn in her body and keep asking until they say yes or no. Keep replies short-to-medium natural text messages.`
    };

    function addMessage(role, content, isPhoto = false, photoType = null) {
      const container = document.getElementById('chat-messages');
      const bubble = document.createElement('div');
      bubble.className = `message-bubble ${role === 'user' ? 'user-bubble' : 'adam-bubble'}`;

      if (isPhoto) {
        bubble.innerHTML = `
          <div class="photo-container">
            <img src="${content}" alt="${photoType} photo">
            <div class="text-xs mt-1 opacity-75">${photoType ? photoType.toUpperCase() + ' from the beach' : ''}</div>
          </div>`;
      } else {
        bubble.textContent = content;
      }

      container.appendChild(bubble);
      container.scrollTop = container.scrollHeight;

      // Add to context for the model
      messages.push({
        role: role === 'user' ? 'user' : 'assistant',
        content: isPhoto ? `[Sent ${photoType?.toUpperCase()} photo from nude beach]` : content
      });
    }

    async function callOpenRouter() {
      if (!OPENROUTER_API_KEY || OPENROUTER_API_KEY.includes("XXXXXXXXXXXXXXXX")) {
        return "❌ Put your real OpenRouter API key in the code (starts with sk-or-)";
      }

      const payload = {
        model: MODEL,
        messages: [systemPrompt, ...messages],
        temperature: 0.9,
        max_tokens: 300
      };

      try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
            "Content-Type": "application/json",
            "HTTP-Referer": window.location.href,
            "X-OpenRouter-Title": "Claire Body Swap Widget"
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const errText = await res.text().catch(() => "");
          console.error(`OpenRouter ${res.status}:`, errText);
          if (res.status === 401) return "❌ 401 Unauthorized — Your API key is invalid or expired. Regenerate it at openrouter.ai/keys";
          if (res.status === 429) return "Rate limit hit. Wait a minute.";
          return `API error (${res.status}). Check console.`;
        }

        const data = await res.json();
        return data.choices?.[0]?.message?.content?.trim() || "The model returned nothing...";

      } catch (err) {
        console.error("Fetch failed:", err);
        return "Network error — check your internet / API key.";
      }
    }

    async function sendToAdam() {
      const typing = document.createElement('div');
      typing.className = 'adam-bubble text-xs italic opacity-70';
      typing.textContent = 'Adam is typing...';
      document.getElementById('chat-messages').appendChild(typing);
      document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;

      const reply = await callOpenRouter();
      typing.remove();
      addMessage('adam', reply);
    }

    function takePhoto(type) {
      const urls = photoSets[type] || [];
      const url = urls[Math.floor(Math.random() * urls.length)] || "https://via.placeholder.com/600x800/444/fff?text=Photo+Failed";
      addMessage('user', url, true, type);
      setTimeout(sendToAdam, 700);
    }

    function sendText() {
      const input = document.getElementById('text-input');
      const text = input.value.trim();
      if (!text) return;
      addMessage('user', text);
      input.value = '';
      setTimeout(sendToAdam, 600);
    }

    // Initialize chat with story context
    function initChat() {
      document.getElementById('chat-messages').innerHTML = '';
      messages = [];

      addMessage('user', "Hey this is Claire's phone. I'm back in her body at the nude beach bro");
      addMessage('adam', "No fucking way! Tits McGee is back online?? Send proof right now");

      setTimeout(() => {
        sendToAdam();
      }, 800);
    }

    window.onload = initChat;
  </script>
</body>
</html>
